<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéStudy</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====== RESET & ROOT ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:        #E3350D;
  --red-dark:   #b01a00;
  --red-light:  #ff6b4a;
  --yellow:     #FFD700;
  --yellow-dim: #b39800;
  --blue:       #3B4CCA;
  --blue-light: #6c7fdd;
  --green:      #3DAA56;
  --white:      #F5F5F5;
  --black:      #111118;
  --ink:        #1C1C28;
  --surface:    #18181f;
  --card:       #1e1e2a;
  --card2:      #252533;
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.14);
  --muted:      #6b6b88;
  --muted2:     #9090aa;
  --hp-green:   #58C914;
  --hp-yellow:  #F5C518;
  --hp-red:     #E3350D;
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.3);
  --shadow:     0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg:  0 16px 48px rgba(0,0,0,0.6);
  --glow-y:     0 0 24px rgba(255,215,0,0.35);
  --glow-r:     0 0 24px rgba(227,53,13,0.35);
  --glow-b:     0 0 24px rgba(59,76,202,0.35);
  --r-sm:       8px;
  --r-md:       14px;
  --r-lg:       20px;
  --r-xl:       28px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle dot grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(59,76,202,0.12), transparent),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(227,53,13,0.08), transparent);
  pointer-events: none; z-index: 0;
}

/* ====== SCROLLBAR ====== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* ====== LAYOUT ====== */
#app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ====== SIDEBAR NAV ====== */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 220px;
  background: var(--ink);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 200;
  padding: 0;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.sidebar-logo-ball {
  width: 32px; height: 32px; flex-shrink: 0;
  animation: spin-slow 10s linear infinite;
}
@keyframes spin-slow { to { transform: rotate(360deg); } }

.sidebar-logo-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--yellow);
  line-height: 1.5;
  text-shadow: 0 0 12px rgba(255,215,0,0.4);
}
.sidebar-logo-text span { color: white; }

.sidebar-coins {
  margin: 12px 16px;
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.18);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  display: none;
  align-items: center; gap: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; color: var(--yellow);
}

.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 14px;
  border: none; background: transparent; cursor: pointer;
  color: var(--muted2); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  border-radius: var(--r-sm);
  transition: all 0.15s; text-align: left;
  margin-bottom: 2px;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
.nav-item.active {
  background: rgba(255,215,0,0.1);
  color: var(--yellow);
  font-weight: 700;
}
.nav-item.active .nav-icon { filter: none; }
.nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }

.sidebar-bottom {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}

/* ====== MAIN CONTENT ====== */
.main-content {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
}

.page { display: none; padding: 32px 36px; max-width: 1100px; }
.page.active { display: block; }

/* ====== PAGE HEADER ====== */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.page-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px; color: var(--yellow);
  text-shadow: 0 0 16px rgba(255,215,0,0.3);
}
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 5px; }

/* ====== CARDS ====== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.card-accent::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--red));
}

/* ====== STAT CARDS ====== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  position: relative; overflow: hidden;
}
.stat-card-val {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px; color: var(--yellow);
  margin-bottom: 4px;
}
.stat-card-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.stat-card-icon {
  position: absolute; right: 14px; top: 14px;
  font-size: 22px; opacity: 0.5;
}

/* ====== BUTTONS ====== */
.btn {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 14px;
  padding: 10px 20px;
  border: none; cursor: pointer;
  border-radius: 50px;
  transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 7px;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue-light); box-shadow: var(--glow-b); }

.btn-danger { background: var(--red-dark); color: white; }
.btn-danger:hover { background: var(--red); box-shadow: var(--glow-r); }

.btn-yellow { background: var(--yellow); color: var(--black); font-weight: 800; }
.btn-yellow:hover { background: #ffe94d; box-shadow: var(--glow-y); }

.btn-success { background: #1f6b32; color: white; }
.btn-success:hover { background: var(--green); }

.btn-ghost {
  background: rgba(255,255,255,0.07);
  color: var(--muted2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: rgba(255,255,255,0.12); color: var(--white); }

.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 13px 26px; font-size: 15px; }
.btn-icon { padding: 8px; border-radius: var(--r-sm); }

/* ====== INPUTS ====== */
.input, .textarea, .select {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  padding: 10px 14px; width: 100%;
  outline: none; transition: border-color 0.15s, background 0.15s;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--blue-light);
  background: rgba(255,255,255,0.08);
}
.textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.input::placeholder, .textarea::placeholder { color: var(--muted); }
.select option { background: var(--card); }
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 5px;
}

/* ====== BADGE ====== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 9px; border-radius: 50px;
  font-size: 11px; font-weight: 700;
}
.badge-blue { background: rgba(59,76,202,0.2); color: var(--blue-light); border: 1px solid rgba(59,76,202,0.4); }
.badge-red  { background: rgba(227,53,13,0.2); color: var(--red-light); border: 1px solid rgba(227,53,13,0.4); }
.badge-yellow { background: rgba(255,215,0,0.12); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
.badge-green { background: rgba(61,170,86,0.15); color: #6dda84; border: 1px solid rgba(61,170,86,0.3); }

/* ====== MODAL ====== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--r-xl);
  padding: 28px; width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.95) translateY(8px);
  transition: transform 0.2s;
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px; color: var(--yellow);
}
.modal-close {
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  color: var(--muted2); width: 30px; height: 30px; border-radius: 50%;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.15); color: white; }

/* ====== TOAST ====== */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 13px;
  min-width: 240px; max-width: 340px;
  box-shadow: var(--shadow);
  animation: toast-in 0.25s ease;
}
@keyframes toast-in { from { transform: translateX(110%); opacity: 0; } }
@keyframes toast-out { to { transform: translateX(110%); opacity: 0; } }
.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }
.toast-info    { border-left: 3px solid var(--blue); }

/* ====== HP BAR ====== */
.hp-wrap, .hp-bar-wrap { width: 100%; }
.hp-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
.hp-track, .hp-bar-track { height: 8px; background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; }
.hp-fill, .hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; background: linear-gradient(90deg, #2d7a2f, var(--hp-green)); }
.hp-high .hp-fill, .hp-high .hp-bar-fill { background: linear-gradient(90deg, #2d7a2f, var(--hp-green)); }
.hp-med  .hp-fill, .hp-med  .hp-bar-fill { background: linear-gradient(90deg, #9a7a00, var(--hp-yellow)); }
.hp-low  .hp-fill, .hp-low  .hp-bar-fill { background: linear-gradient(90deg, #8a1000, var(--hp-red)); animation: hp-pulse 0.8s infinite; }
@keyframes hp-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ====== TYPE BADGES ====== */
.type-badge {
  display: inline-flex; align-items: center;
  padding: 1px 7px; border-radius: 3px;
  font-size: 9px; font-weight: 800; text-transform: uppercase;
}
.type-fire{background:#FD7D24;color:#fff} .type-water{background:#4592C4;color:#fff}
.type-grass{background:#9BCC50;color:#1a1a2e} .type-electric{background:#EED535;color:#1a1a2e}
.type-psychic{background:#F366B9;color:#fff} .type-ice{background:#51C4E7;color:#1a1a2e}
.type-dragon{background:#53409E;color:#fff} .type-dark{background:#707070;color:#fff}
.type-fairy{background:#FDB9E9;color:#1a1a2e} .type-normal{background:#A4ACAF;color:#1a1a2e}
.type-fighting{background:#D56723;color:#fff} .type-flying{background:#3DC7EF;color:#1a1a2e}
.type-poison{background:#B97FC9;color:#fff} .type-ground{background:#F7DE3F;color:#1a1a2e}
.type-rock{background:#A38C21;color:#fff} .type-bug{background:#729F3F;color:#fff}
.type-ghost{background:#7B62A3;color:#fff} .type-steel{background:#9EB7B8;color:#1a1a2e}

/* ====== RARITY BADGES ====== */
.rarity-badge { display:inline-flex; align-items:center; gap:3px; padding:1px 8px; border-radius:50px; font-size:9px; font-weight:800; }
.rarity-common    { background:rgba(164,172,175,0.2); color:#A4ACAF; border:1px solid rgba(164,172,175,0.3); }
.rarity-uncommon  { background:rgba(61,170,86,0.2); color:#6dda84; border:1px solid rgba(61,170,86,0.3); }
.rarity-rare      { background:rgba(59,76,202,0.2); color:var(--blue-light); border:1px solid rgba(59,76,202,0.3); }
.rarity-epic      { background:rgba(156,39,176,0.2); color:#ce93d8; border:1px solid rgba(156,39,176,0.3); }
.rarity-legendary { background:rgba(255,215,0,0.15); color:var(--yellow); border:1px solid rgba(255,215,0,0.4); }

/* ====== TEMARIOS ====== */
.temario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.temario-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: all 0.2s;
}
.temario-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border2); }

.temario-card-top {
  padding: 16px 18px 12px;
  background: linear-gradient(135deg, rgba(59,76,202,0.15), transparent);
}
.temario-card-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--yellow); line-height: 1.7;
  margin-bottom: 6px;
}
.temario-card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

.temario-card-stats {
  display: flex; gap: 16px;
  padding: 10px 18px;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.temario-stat { font-size: 12px; color: var(--muted2); font-weight: 600; }
.temario-stat strong { color: var(--white); }

.temario-card-actions {
  display: flex; gap: 6px; padding: 12px 18px;
  flex-wrap: wrap;
}

/* ====== EDITOR LAYOUT ====== */
.editor-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 16px;
  min-height: 500px;
}

.puntos-sidebar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.puntos-sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.puntos-sidebar-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; color: var(--yellow);
}
.puntos-list { padding: 6px; flex: 1; overflow-y: auto; }
.punto-item {
  padding: 9px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 2px; font-size: 13px; font-weight: 600;
  transition: all 0.15s; color: var(--muted2);
}
.punto-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
.punto-item.active { background: rgba(255,215,0,0.1); color: var(--yellow); }
.punto-item-info { flex: 1; min-width: 0; }
.punto-item-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.punto-item-count { font-size: 10px; color: var(--muted); margin-top: 1px; }
.punto-item-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
.punto-item:hover .punto-item-actions { opacity: 1; }

.editor-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
}

/* ====== PREGUNTA ITEMS ====== */
.pregunta-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 13px 16px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: border-color 0.15s;
}
.pregunta-item:hover { border-color: var(--border2); }
.pregunta-num {
  width: 26px; height: 26px; flex-shrink: 0;
  background: rgba(59,76,202,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: white;
}
.pregunta-info { flex: 1; min-width: 0; }
.pregunta-text { font-size: 13px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
.pregunta-meta { display: flex; gap: 6px; flex-wrap: wrap; }

/* ====== EMPTY STATE ====== */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 280px; gap: 12px; color: var(--muted); text-align: center; padding: 20px;
}
.empty-icon { font-size: 44px; opacity: 0.4; }
.empty-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--muted);
}

/* ====== POKEMON CARDS ====== */
.pokemon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.pokemon-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px; text-align: center;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.pokemon-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: rgba(255,215,0,0.25); }
.pokemon-card.selected { border-color: var(--yellow); box-shadow: var(--glow-y); }
.pokemon-sprite { width: 80px; height: 80px; image-rendering: pixelated; margin: 0 auto 6px; display: block; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); transition: transform 0.2s; }
.pokemon-card:hover .pokemon-sprite { transform: scale(1.1) translateY(-3px); }
.pokemon-name { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--yellow); margin-bottom: 5px; }

/* ====== BATTLE ====== */
.battle-arena {
  background: linear-gradient(180deg, #0a1628 0%, #0d1f3a 60%, #162d4a 100%);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  height: 280px; position: relative; overflow: hidden;
}
.battle-ground-enemy {
  position: absolute; bottom: 95px; left: 0; right: 0;
  height: 22px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.04));
  border-radius: 50%;
}
.battle-ground-player {
  position: absolute; bottom: 40px; left: 0; right: 0;
  height: 22px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.06));
  border-radius: 50%;
}
.battle-pokemon-enemy { position: absolute; right: 60px; top: 20px; }
.battle-pokemon-player { position: absolute; left: 40px; bottom: 30px; }
.battle-sprite { width: 120px; height: 120px; image-rendering: pixelated; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
.battle-sprite-enemy { animation: battle-bob-e 2.5s ease-in-out infinite; }
.battle-sprite-player { animation: battle-bob-p 2.8s ease-in-out infinite; }
@keyframes battle-bob-e { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes battle-bob-p { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.battle-info-enemy {
  position: absolute; top: 14px; left: 16px;
  background: rgba(10,15,28,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  padding: 10px 14px; min-width: 190px;
}
.battle-info-player {
  position: absolute; bottom: 14px; right: 16px;

// INIT
// ============================================================
function init() {
  loadState();
  if (!state.jugador) {
    showWelcome();
  } else {
    renderAll();
  }
  renderJsonTemplate();
}

function loadState() {
  try {
    const s = localStorage.getItem('pokestudy_state');
    if (s) state = JSON.parse(s);
  } catch(e) {}
  migrateState();
}

function migrateState() {
  // Fix flashcards that were saved without dorso (e.g. imported with wrong field names)
  (state.temarios || []).forEach(t => {
    (t.puntos || []).forEach(p => {
      (p.preguntas || []).forEach(q => {
        if (q.tipo === 'flashcard') {
          if (!q.frente) q.frente = q.pregunta || q.front || q.question || '';
          if (!q.dorso)  q.dorso  = q.respuesta || q.back || q.answer || q.reverso || '';
        }
      });
    });
  });
}

function saveState() {
  localStorage.setItem('pokestudy_state', JSON.stringify(state));
}

function renderAll() {
  renderHome();
  renderTemarios();
  renderPokemon();
  renderJugar();
  renderJugador();
  updateCoinDisplay();
}

let selectedStarterId = null;

function selectStarter(id, el) {
  document.querySelectorAll('.poke-select-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedStarterId = id;
}

function createPlayer() {
  const name = document.getElementById('playerNameInput')?.value?.trim();
  if (!name) { showToast('¡Escribe tu nombre de entrenador!', 'error'); return; }
  
  // Dar 3 pokemon comunes aleatorios de nivel 5
  const comunes = ALL_POKEMON.filter(p => p.rarity === 'common');
  const shuffled = shuffle([...comunes]);
  const starterTeam = shuffled.slice(0, 3).map(p => createPokemonInstance(p, 5));
  
  state.jugador = {
    name,
    level: 1,
    exp: 0,
    wins: 0,
    losses: 0,
    badges: 0,
    coins: 200,  // monedas iniciales
    inventory: { pokeball:5, potion:3 }, // inventario inicial
    team: starterTeam,
    box: [],
    joinDate: new Date().toISOString()
  };
  
  saveState();
  const names = starterTeam.map(p => p.name).join(', ');
  showToast(`¡Bienvenido, ${name}! Tu equipo: ${names}. ¡Tienes 200 🪙 para la tienda!`, 'success');
  
  document.getElementById('welcomeOverlay')?.remove();
  renderAll();
  showSection('home');
}

function createPokemonInstance(data, level = 5) {
  const hpBase = data.stats.hp;
  const maxHp = Math.floor(((2 * hpBase * level) / 100) + level + 10);
  const moves = getMoves(data);
  return {
    instanceId: Date.now() + Math.random(),
    pokemonId: data.id,
    name: data.name,
    num: data.num,
    types: data.types,
    sprite: data.sprite,
    back: data.back,
    level,
    exp: 0,
    expToNext: level * 100,
    maxHp,
    currentHp: maxHp,
    stats: { ...data.stats },
    rarity: data.rarity || 'common',
    moves,
    captured: new Date().toISOString()
  };
}

function getMoves(data) {
  const moves = [];
  const type1 = data.types[0];
  const type2 = data.types[1];
  const pool = BASE_MOVES[type1] || BASE_MOVES.normal;
  moves.push({ ...pool[0], currentPP: pool[0].pp });
  moves.push({ ...pool[1], currentPP: pool[1].pp });
  if (type2 && BASE_MOVES[type2]) {
    moves.push({ ...BASE_MOVES[type2][0], currentPP: BASE_MOVES[type2][0].pp });
  }
  moves.push({ name: 'Placaje', power: 35, pp: 35, type: 'normal', currentPP: 35 });
  return moves.slice(0, 4);
}

function createTemario() {
  const nombre = document.getElementById('newTemNombre')?.value?.trim();
  const descripcion = document.getElementById('newTemDesc')?.value?.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
  
  const t = { id: genId(), nombre, descripcion, puntos: [], creado: new Date().toISOString() };
  state.temarios.push(t);
  saveState();
  closeModal();
  showToast('Temario creado!', 'success');
  renderTemarios();
  openEditor(t.id);

function deleteTemario(id) {
  if (!confirm('¿Eliminar este temario?')) return;
  state.temarios = state.temarios.filter(t => t.id !== id);
  saveState();
  renderTemarios();
  showToast('Temario eliminado', 'info');
}

function exportTemario(id) {
  const t = state.temarios.find(t => t.id === id);
  if (!t) return;
  const blob = new Blob([JSON.stringify(t, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${t.nombre.replace(/\s+/g,'_')}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Temario exportado!', 'success');
}

function importTemario() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        // Puede ser un temario completo o solo puntos JSON
        if (data.nombre && data.puntos) {
          data.id = genId();
          data.creado = new Date().toISOString();
          state.temarios.push(data);
          saveState();
          renderTemarios();
          showToast('Temario importado!', 'success');
        } else {
          showToast('Formato JSON no reconocido', 'error');
        }
      } catch(e) {
        showToast('Error al leer el JSON', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function switchImportTab(tab) {
  document.getElementById('importTabPaste').classList.toggle('active', tab === 'paste');
  document.getElementById('importTabFile').classList.toggle('active', tab === 'file');
  document.getElementById('importPastePanel').style.display = tab === 'paste' ? 'block' : 'none';
  document.getElementById('importFilePanel').style.display = tab === 'file' ? 'block' : 'none';
}

function handleImportDrop(e) {
  e.preventDefault();
  document.getElementById('importDropZone')?.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readAndImportFile(file);
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (file) readAndImportFile(file);
}

function readAndImportFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      importTemarioData(data);
    } catch(e) {
      showToast('Error al leer el archivo JSON', 'error');
    }
  };
  reader.readAsText(file);
}

function doImportTemarioCompleto() {
  const raw = document.getElementById('importTemarioJson')?.value?.trim();
  if (!raw) { showToast('Pega el JSON primero', 'error'); return; }
  try {
    const data = JSON.parse(raw);
    importTemarioData(data);
  } catch(e) {
    showToast('JSON inválido: ' + e.message, 'error');
  }
}

function importTemarioData(data) {
  // Support both full temario and array of questions (legacy)
  if (Array.isArray(data)) {
    showToast('Ese formato es de preguntas sueltas. Usa el editor para importarlas a un punto.', 'error');
    return;
  }
  if (!data.nombre || !data.puntos) {
    showToast('El JSON debe tener "nombre" y "puntos"', 'error');
    return;
  }
  const valid = ['multiple', 'vf', 'rellenar', 'flashcard', 'relacionar'];
  let totalQ = 0;
  const temario = {
    id: genId(),
    nombre: data.nombre,
    descripcion: data.descripcion || '',
    creado: new Date().toISOString(),
    puntos: (data.puntos || []).map(p => ({
      id: genId(),
      nombre: p.nombre || 'Sin nombre',
      preguntas: (p.preguntas || []).filter(q => valid.includes(q.tipo)).map(q => {
        totalQ++;
        // Normalize flashcard field names
        const normalized = { ...q, id: genId() };
        if (q.tipo === 'flashcard') {
          normalized.frente = q.frente || q.pregunta || q.front || q.question || '';
          normalized.dorso  = q.dorso  || q.respuesta || q.back || q.answer || q.reverso || '';
        }
        return normalized;
      })
    }))
  };
  state.temarios.push(temario);
  saveState();
  renderAll();
  closeModal();
  showToast(`✅ "${temario.nombre}" importado — ${temario.puntos.length} puntos, ${totalQ} preguntas`, 'success');
}

function openImportPreguntas(puntoId) {
  openModal('Importar Preguntas JSON', `

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('jsonFileInput').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleJsonDrop(event,'${puntoId}')">
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-text">Haz clic o arrastra tu .json aquí</div>
    </div>
    <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJsonFile(event,'${puntoId}')">
    <div class="divider"></div>
    <div class="form-group">
      <label class="form-label">O pega el JSON directamente</label>
      <textarea class="textarea" id="jsonPasteArea" placeholder='[{"tipo":"multiple","pregunta":"...","opciones":[],"correcta":0}]' style="min-height:120px; font-family:monospace; font-size:12px;"></textarea>

    </div>

function handleJsonDrop(e, puntoId) {
  e.preventDefault();
  document.getElementById('dropZone')?.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readJsonFile(file, puntoId);
}

function handleJsonFile(e, puntoId) {
  const file = e.target.files[0];
  if (file) readJsonFile(file, puntoId);
}

function readJsonFile(file, puntoId) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      importPreguntasData(data, puntoId);
    } catch(e) { showToast('Error al leer el JSON', 'error'); }
  };
  reader.readAsText(file);
}

function importPreguntasFromPaste(puntoId) {
  const text = document.getElementById('jsonPasteArea')?.value?.trim();
  if (!text) { showToast('Pega el JSON primero', 'error'); return; }
  try {
    const data = JSON.parse(text);
    importPreguntasData(data, puntoId);
  } catch(e) { showToast('JSON inválido', 'error'); }
}

function importPreguntasData(data, puntoId) {
  const temario = state.temarios.find(t => t.id === state.currentTemarioId);
  const punto = temario?.puntos.find(p => p.id === puntoId);
  if (!punto) return;
  
  const preguntas = Array.isArray(data) ? data : data.preguntas || [];
  if (!preguntas.length) { showToast('No se encontraron preguntas', 'error'); return; }
  
  const valid = ['multiple', 'vf', 'rellenar', 'flashcard', 'relacionar'];
  let added = 0;
  preguntas.forEach(q => {
    if (valid.includes(q.tipo)) {
      if (!q.id) q.id = genId();
      punto.preguntas.push(q);
      added++;
    }
  });
  
  saveState();
  closeModal();
  renderEditor();
  showToast(`${added} preguntas importadas!`, 'success');
}

function renderQForm() {

  const form = document.getElementById('qForm');
  if (!form) return;
  
  const formulas = {
    multiple: `

      <div class="form-group"><label class="form-label">Opción A</label><input class="input" id="qA" placeholder="Opción A"></div>
      <div class="form-group"><label class="form-label">Opción B</label><input class="input" id="qB" placeholder="Opción B"></div>
      <div class="form-group"><label class="form-label">Opción C</label><input class="input" id="qC" placeholder="Opción C (opcional)"></div>
      <div class="form-group"><label class="form-label">Opción D</label><input class="input" id="qD" placeholder="Opción D (opcional)"></div>
      <div class="form-group"><label class="form-label">Respuesta correcta (índice 0-3)</label><input class="input" id="qCorrecta" type="number" min="0" max="3" value="0"></div>
    `,
    vf: `
      <div class="form-group"><label class="form-label">Pregunta</label><textarea class="textarea" id="qPregunta" placeholder="Afirmación verdadera o falsa..."></textarea></div>
      <div class="form-group"><label class="form-label">Respuesta</label>
        <select class="select" id="qRespuestaVF"><option value="true">Verdadero</option><option value="false">Falso</option></select>
      </div>
    `,
    rellenar: `
      <div class="form-group"><label class="form-label">Texto con huecos (usa ___ para los huecos)</label><textarea class="textarea" id="qTexto" placeholder="El ___ es la capital de España. La ___ es un planeta."></textarea></div>
      <div class="form-group"><label class="form-label">Respuestas para cada hueco (separadas por coma)</label><input class="input" id="qRespuestas" placeholder="Madrid, Tierra"></div>
    `,
    flashcard: `
      <div class="form-group"><label class="form-label">Frente (concepto)</label><textarea class="textarea" id="qFrente" placeholder="¿Qué es la fotosíntesis?"></textarea></div>
      <div class="form-group"><label class="form-label">Dorso (respuesta exacta)</label><textarea class="textarea" id="qDorso" placeholder="Proceso por el cual las plantas convierten luz solar en energía..."></textarea></div>
    `,
    relacionar: `
      <div class="form-group"><label class="form-label">Instrucción</label><input class="input" id="qPregunta" placeholder="Relaciona los conceptos..."></div>
      <div class="form-group"><label class="form-label">Pares (izquierda:derecha separados por | )</label><textarea class="textarea" id="qPares" placeholder="Fotosíntesis:Plantas\nRespiración:Animales\nOsmosis:Membranas"></textarea></div>
    `
  };
  form.innerHTML = formulas[tipo] || '';
}

function savePreguntaManual(puntoId) {
  const tipo = document.getElementById('qTipo')?.value;
  const temario = state.temarios.find(t => t.id === state.currentTemarioId);
  const punto = temario?.puntos.find(p => p.id === puntoId);
  if (!punto) return;
  
  let pregunta = null;
  
  if (tipo === 'multiple') {
    const p = document.getElementById('qPregunta')?.value?.trim();
    const a = document.getElementById('qA')?.value?.trim();
    const b = document.getElementById('qB')?.value?.trim();
    const c = document.getElementById('qC')?.value?.trim();
    const d = document.getElementById('qD')?.value?.trim();
    const corr = parseInt(document.getElementById('qCorrecta')?.value) || 0;
    if (!p || !a || !b) { showToast('Completa los campos obligatorios', 'error'); return; }
    const opciones = [a, b, c, d].filter(Boolean);
    pregunta = { id: genId(), tipo, pregunta: p, opciones, correcta: corr };
  } else if (tipo === 'vf') {
    const p = document.getElementById('qPregunta')?.value?.trim();
    const r = document.getElementById('qRespuestaVF')?.value === 'true';
    if (!p) { showToast('Escribe la pregunta', 'error'); return; }
    pregunta = { id: genId(), tipo, pregunta: p, respuesta: r };
  } else if (tipo === 'rellenar') {
    const texto = document.getElementById('qTexto')?.value?.trim();
    const respuestasRaw = document.getElementById('qRespuestas')?.value?.trim();
    if (!texto) { showToast('Escribe el texto con huecos', 'error'); return; }
    const respuestas = respuestasRaw.split(',').map(s => s.trim()).filter(Boolean);
    pregunta = { id: genId(), tipo, texto, respuestas };
  } else if (tipo === 'flashcard') {
    const frente = document.getElementById('qFrente')?.value?.trim();
    const dorso = document.getElementById('qDorso')?.value?.trim();
    if (!frente || !dorso) { showToast('Completa el frente y dorso', 'error'); return; }
    pregunta = { id: genId(), tipo, frente, dorso };
  } else if (tipo === 'relacionar') {
    const p = document.getElementById('qPregunta')?.value?.trim() || 'Relaciona los elementos';
    const paresRaw = document.getElementById('qPares')?.value?.trim();
    if (!paresRaw) { showToast('Añade los pares', 'error'); return; }
    const pares = paresRaw.split('\n').map(l => {
      const parts = l.split(':');
      return { izq: parts[0]?.trim(), der: parts[1]?.trim() };
    }).filter(p => p.izq && p.der);
    pregunta = { id: genId(), tipo, pregunta: p, pares };
  }
  
  if (pregunta) {
    punto.preguntas.push(pregunta);
    saveState();
    closeModal();
    renderEditor();
    showToast('Pregunta añadida!', 'success');
  }
}

function deletePregunta(preguntaId) {
  const temario = state.temarios.find(t => t.id === state.currentTemarioId);
  const punto = temario?.puntos.find(p => p.id === state.currentPuntoId);
  if (!punto) return;
  punto.preguntas = punto.preguntas.filter(q => q.id !== preguntaId);
  saveState();
  renderEditor();
}

function renderPokemonCard(p) {
  const hpPct = Math.round(p.currentHp / p.maxHp * 100);
  const hpClass = hpPct > 50 ? 'hp-high' : hpPct > 20 ? 'hp-med' : 'hp-low';
  const rc = RARITY_CONFIG[p.rarity] || RARITY_CONFIG.common;
  return `
    <div class="pokemon-card rarity-${p.rarity||'common'}">
      <img class="pokemon-sprite" src="${p.sprite}" alt="${p.name}">
      <div class="pokemon-number">${p.num || ''}</div>
      <div class="pokemon-name">${p.name}</div>
      <span class="rarity-badge rarity-${p.rarity||'common'}" style="margin:4px 0;">${rc.label}</span>
      <div style="font-size:11px;color:var(--muted2);font-weight:700;margin-bottom:6px;">Nv.${p.level} · EXP: ${p.exp}/${p.expToNext}</div>
      <div class="pokemon-types" style="margin-bottom:8px;">${p.types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('')}</div>
      <div class="${hpClass} hp-bar-wrap">
        <div class="hp-label"><span>HP</span><span>${p.currentHp}/${p.maxHp}</span></div>
        <div class="hp-bar-track"><div class="hp-bar-fill" style="width:${hpPct}%"></div></div>
      </div>
      <div class="exp-bar-track"><div class="exp-bar-fill" style="width:${Math.round(p.exp/p.expToNext*100)}%"></div></div>
      <div class="pokemon-stats-mini" style="margin-top:8px;">${renderMiniStats(p.stats)}</div>
    </div>
  `;
}

function renderMiniStats(stats) {
  const statList = [
    { key: 'atk', name: 'ATK', color: '#ff6b4a' },
    { key: 'def', name: 'DEF', color: '#4a90e2' },
    { key: 'spd', name: 'VEL', color: '#ffd700' },
  ];
  return statList.map(s => `
    <div class="pokemon-stat-row">
      <div class="pokemon-stat-name">${s.name}</div>
      <div class="pokemon-stat-bar"><div class="pokemon-stat-fill" style="width:${Math.min(100,Math.round(stats[s.key]/160*100))}%;background:${s.color};"></div></div>
      <div class="pokemon-stat-value">${stats[s.key]}</div>
    </div>
  `).join('');
}

// Seleccionar pokémon rival con spawn ponderado por rareza
function spawnRivalPokemon(playerLevel) {
  const totalWeight = ALL_POKEMON.reduce((sum, p) => sum + (RARITY_CONFIG[p.rarity]?.spawnWeight || 1), 0);
  let rand = Math.random() * totalWeight;
  let chosen = ALL_POKEMON[0];
  for (const p of ALL_POKEMON) {
    rand -= (RARITY_CONFIG[p.rarity]?.spawnWeight || 1);
    if (rand <= 0) { chosen = p; break; }
  }
  const rivalLevel = playerLevel + randInt(0, 3);
  return createPokemonInstance(chosen, rivalLevel);
}

function startBattle() {
  const temarioId = document.getElementById('battleTemario')?.value;
  const puntoId = document.getElementById('battlePunto')?.value;
  const dificultad = document.getElementById('battleDificultad')?.value;
  const myPokemonIdx = parseInt(document.getElementById('battleMyPokemon')?.value || '0');
  const infiniteMode = document.getElementById('infiniteMode')?.checked || false;
  
  if (!temarioId) { showToast('Selecciona un temario', 'error'); return; }
  
  const temario = state.temarios.find(t => t.id === temarioId);
  let preguntas = [];
  
  if (puntoId === 'all') {
    temario.puntos.forEach(p => preguntas.push(...(p.preguntas || [])));
  } else {
    const punto = temario.puntos.find(p => p.id === puntoId);
    preguntas = punto?.preguntas || [];
  }
  
  if (!preguntas.length) { showToast('No hay preguntas en este temario/punto', 'error'); return; }
  
  preguntas = shuffle([...preguntas]);
  const totalPreguntas = preguntas.length;
  
  // Infinite mode config
  let infiniteConfig = null;
  if (infiniteMode) {
    const condition = document.getElementById('infiniteCondition')?.value || 'time';
    if (condition === 'time') {
      const mins = parseInt(document.getElementById('infiniteMinutes')?.value || '15');
      infiniteConfig = { condition:'time', limitMs: mins * 60 * 1000, startTime: Date.now() };
    } else {
      const rounds = parseInt(document.getElementById('infiniteRounds')?.value || '2');
      infiniteConfig = { condition:'rounds', targetRounds: rounds, completedRounds: 0 };
    }
  }
  
  // Rival con spawn ponderado
  const myPokemonLevel = state.jugador.team[myPokemonIdx]?.level || 5;
  const rivalPokemon = spawnRivalPokemon(myPokemonLevel);
  const myPokemon = JSON.parse(JSON.stringify(state.jugador.team[myPokemonIdx]));
  
  const rc = RARITY_CONFIG[rivalPokemon.rarity];
  
  state.battle = {
    phase: 'fighting',
    dificultad,
    infiniteMode,
    infiniteConfig,
    totalPreguntas,
    temarioId,
    preguntas,
    preguntaIdx: 0,
    myPokemonIdx,
    myPokemon,
    rivalPokemon,
    rivalName: `Rival ${getRandomName()}`,
    log: [`✨ ¡${rivalPokemon.name} [${rc?.label||''}] apareció!`, `¡Ve ${myPokemon.name}!`],
    logIdx: 1,
    pendingMove: null,
    flashcardShown: false,
    relacionarState: null,
    rellenarState: null,
    buffs: { atkTurns:0, defTurns:0 }, // potenciadores activos
    correctCount: 0, // para monedas
  };
  
  // Flash especial si es épico/legendario
  if (rivalPokemon.rarity === 'epic' || rivalPokemon.rarity === 'legendary') {
    showToast(`✨ ¡Apareció un ${rc.label}: ${rivalPokemon.name}!`, 'success');
  }
  
  saveState();
  renderBattle();
  startRivalTimer();
}

function getRandomName() {
  const names = ['Gary','Misty','Brock','Jesse','James','Lance','Lorelei','Giovanni','Sabrina','Erika'];
  return names[Math.floor(Math.random() * names.length)];
}

          <div style="font-size:15px; font-weight:700; line-height:1.6; color:var(--white);">${escapeHtml(frente)}</div>
        </div>
        <p style="color:var(--muted2); font-size:12px; text-align:center; margin-bottom:12px;">Memoriza la respuesta y pulsa "Ver respuesta"</p>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="showFlashcardBack()">👁️ Ver Respuesta</button>
      `;
    } else {
      questionHTML = `
        <div style="font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:12px;">🃏 MEMORIZA — <span id="flashcardTimer" style="color:white;">5</span>s</div>
        <div style="background:rgba(255,215,0,0.05); border:1px solid rgba(255,215,0,0.2); border-radius:10px; padding:10px 14px; margin-bottom:10px; font-size:13px; color:var(--muted2);">Concepto: <strong style="color:white;">${escapeHtml(frente)}</strong></div>
        <div id="flashcardDorsoReveal" style="background:rgba(61,170,86,0.1); border:1px solid rgba(61,170,86,0.3); border-radius:10px; padding:14px; margin-bottom:12px; text-align:center; font-size:15px; font-weight:700; color:#6dda84; line-height:1.5;">
          ${dorso ? escapeHtml(dorso) : '<span style="color:var(--muted);font-size:13px;">⚠️ Sin respuesta guardada — edita la flashcard</span>'}
        </div>
        <div id="flashcardTimerRow" style="text-align:center; margin-bottom:10px;">
          <div style="height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
            <div id="flashcardTimerBar" style="height:100%; width:100%; background:var(--yellow); border-radius:2px; transition:width 1s linear;"></div>
          </div>
          <div style="font-size:11px; color:var(--muted); margin-top:5px;">La respuesta se ocultará en <span id="flashcardTimerLabel" style="color:var(--yellow); font-weight:700;">5</span>s</div>
        </div>
        <textarea class="textarea" id="flashcardAnswer" placeholder="Escribe la respuesta aquí..." style="min-height:80px;" disabled></textarea>
        <button class="btn btn-yellow" id="flashcardSubmitBtn" style="width:100%; margin-top:10px; justify-content:center; opacity:0.35; pointer-events:none;" onclick="answerFlashcard()">Comprobar →</button>
      `;
      setTimeout(() => startFlashcardCountdown(), 30);
    }
  } else if (tipo === 'relacionar') {
    const pares = q.pares || [];
    if (!b.relacionarState) {
      const shuffledDer = shuffle(pares.map(p => p.der));
      b.relacionarState = { selected: null, matches: {}, shuffledDer };
    }
    const rs = b.relacionarState;
    const allMatched = Object.keys(rs.matches).length === pares.length;
    
    questionHTML = `
      <div style="font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:12px;">🔗 RELACIONAR</div>
      <div class="question-text" style="font-size:13px; margin-bottom:12px;">${escapeHtml(q.pregunta)}</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
          ${pares.map((p, i) => `
            <div style="padding:8px 12px; background:${rs.matches[i] !== undefined ? 'rgba(61,170,86,0.2)' : rs.selected === i ? 'rgba(59,76,202,0.3)' : 'rgba(255,255,255,0.06)'}; border:1px solid ${rs.matches[i] !== undefined ? 'rgba(61,170,86,0.5)' : rs.selected === i ? 'var(--blue-light)' : 'var(--border)'}; border-radius:8px; cursor:pointer; margin-bottom:6px; font-size:13px; font-weight:700; transition:all 0.2s;" onclick="selectRelacionarIzq(${i})">
              ${escapeHtml(p.izq)} ${rs.matches[i] !== undefined ? '✓' : ''}
            </div>
          `).join('')}
        </div>
        <div>
          ${rs.shuffledDer.map((d, i) => {
            const isMatched = Object.values(rs.matches).includes(i);
            return `
              <div style="padding:8px 12px; background:${isMatched ? 'rgba(61,170,86,0.2)' : 'rgba(255,255,255,0.06)'}; border:1px solid ${isMatched ? 'rgba(61,170,86,0.5)' : 'var(--border)'}; border-radius:8px; cursor:pointer; margin-bottom:6px; font-size:13px; font-weight:700; transition:all 0.2s; ${isMatched ? 'opacity:0.5' : ''}" onclick="selectRelacionarDer(${i})">
                ${escapeHtml(d)}
              </div>
            `;
          }).join('')}
        </div>
      </div>
      ${allMatched ? `<button class="btn btn-yellow" style="width:100%; margin-top:12px; justify-content:center;" onclick="checkRelacionar()">Comprobar →</button>` : ''}
    `;
  }
  
  return `<div class="question-area">${questionHTML}</div>`;
}

// ============================================================
// ANSWER HANDLERS
// ============================================================
function answerMultiple(idx) {
  const b = state.battle;
  const q = b.preguntas[b.preguntaIdx];
  const correct = idx === q.correcta;
  processAnswer(correct, q.opciones[q.correcta]);
}

function answerVF(answer) {
  const b = state.battle;
  const q = b.preguntas[b.preguntaIdx];
  const correct = answer === q.respuesta;
  processAnswer(correct, q.respuesta ? 'Verdadero' : 'Falso');
}

function answerRellenar() {
  const b = state.battle;
  const q = b.preguntas[b.preguntaIdx];
  const respuestas = q.respuestas || [];
  let allCorrect = true;
  respuestas.forEach((r, i) => {
    const input = document.getElementById(`rellena_${i}`);
    if (!input) { allCorrect = false; return; }
    if (input.value.trim().toLowerCase() !== r.toLowerCase()) allCorrect = false;
  });
  processAnswer(allCorrect, respuestas.join(', '));
}

function showFlashcardBack() {
  state.battle.flashcardShown = true;
  renderBattle();
}

function startFlashcardCountdown() {
  const TOTAL = 5;
  let secs = TOTAL;

  // Grab elements once — if any are missing the DOM isn't ready yet, bail
  const get = id => document.getElementById(id);
  if (!get('flashcardTimer')) return;

  // Pause the rival timer while the player reads the answer
  stopRivalTimer();

  // Kick off the progress bar shrink after one frame
  requestAnimationFrame(() => {
    const bar = get('flashcardTimerBar');
    if (bar) { bar.style.transition = `width ${TOTAL}s linear`; bar.style.width = '0%'; }
  });

  const interval = setInterval(() => {
    // If the overlay was closed / re-rendered, stop
    if (!get('flashcardTimer')) { clearInterval(interval); return; }

    secs--;

    const timerEl    = get('flashcardTimer');
    const timerLabel = get('flashcardTimerLabel');
    if (timerEl)    timerEl.textContent    = secs;
    if (timerLabel) timerLabel.textContent = secs;

    if (secs <= 0) {
      clearInterval(interval);

      // Hide the answer
      const dorsoEl = get('flashcardDorsoReveal');
      if (dorsoEl) dorsoEl.style.display = 'none';

      // Update timer row message
      const timerRow = get('flashcardTimerRow');
      if (timerRow) timerRow.innerHTML = `
        <div style="text-align:center; padding:6px 0; font-family:'Press Start 2P',monospace; font-size:9px; color:var(--yellow);">
          ✏️ ¡Escribe la respuesta!
        </div>`;

      // Unlock textarea & button
      const answerEl  = get('flashcardAnswer');
      const submitBtn = get('flashcardSubmitBtn');
      if (answerEl)  { answerEl.disabled = false; answerEl.focus(); }
      if (submitBtn) { submitBtn.style.opacity = '1'; submitBtn.style.pointerEvents = 'auto'; }

      // Resume the rival timer now that the player must write
      startRivalTimer();
    }
  }, 1000);
}

function normalizeText(str) {
  return str
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // quita tildes/acentos
    .replace(/[^a-z0-9\s]/g, '')                          // quita puntuación
    .replace(/\s+/g, ' ')                                  // colapsa espacios
    .trim();
}

function answerFlashcard() {
  const b = state.battle;
  const q = b.preguntas[b.preguntaIdx];
  const answer = document.getElementById('flashcardAnswer')?.value || '';
  const dorso  = q.dorso || q.respuesta || q.reverso || q.back || q.answer || '';
  const correct = normalizeText(answer) === normalizeText(dorso);
  processAnswer(correct, dorso);
}

function selectRelacionarIzq(idx) {
  const rs = state.battle.relacionarState;
  if (rs.matches[idx] !== undefined) return;
  rs.selected = idx;
  renderBattle();
}

function selectRelacionarDer(idx) {
  const rs = state.battle.relacionarState;
  if (rs.selected === null) return;
  if (Object.values(rs.matches).includes(idx)) return;
  rs.matches[rs.selected] = idx;
  rs.selected = null;
  renderBattle();
}

function checkRelacionar() {
  const b = state.battle;
  const q = b.preguntas[b.preguntaIdx];
  const rs = b.relacionarState;
  const pares = q.pares || [];
  
  let correct = true;
  pares.forEach((p, i) => {
    const matchedDerIdx = rs.matches[i];
    if (matchedDerIdx === undefined || rs.shuffledDer[matchedDerIdx] !== p.der) {
      correct = false;
    }
  });
  
  processAnswer(correct, pares.map(p => `${p.izq} → ${p.der}`).join(', '));
}

function openInventoryModal() {
  const b = state.battle;
  if (!b || b.phase !== 'fighting') return;
  const inv = state.jugador?.inventory || {};
  
  const healItems = SHOP_ITEMS.filter(i => i.category === 'heal');

  openModal('🎒 Inventario de Batalla', `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:10px;">💊 Pociones</div>
      <div class="inventory-grid">
        ${healItems.map(item => {
          const qty = inv[item.id] || 0;
          return `<div class="inv-item ${qty===0?'empty':''}" onclick="${qty>0?`useItem('${item.id}')`:''}" title="${item.desc}">
            <div class="inv-item-icon">${item.icon}</div>
            <div class="inv-item-name">${item.name}</div>
            <div class="inv-item-qty">${qty > 0 ? `x${qty}` : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div style="font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:10px;">⚡ Potenciadores</div>
      <div class="inventory-grid">
        ${boostItems.map(item => {
          const qty = inv[item.id] || 0;
          return `<div class="inv-item ${qty===0?'empty':''}" onclick="${qty>0?`useItem('${item.id}')`:''}" title="${item.desc}">
            <div class="inv-item-icon">${item.icon}</div>
            <div class="inv-item-name">${item.name}</div>
            <div class="inv-item-qty">${qty > 0 ? `x${qty}` : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted2);margin-top:12px;text-align:center;">Haz clic en un ítem para usarlo</p>
  `);
}

function useItem(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  const b = state.battle;
  if (!item || !b || !state.jugador) return;
  
  const inv = state.jugador.inventory;
  if (!inv[itemId] || inv[itemId] <= 0) return;
  inv[itemId]--;
  
  if (item.category === 'heal') {
    if (item.allTeam) {
      state.jugador.team.forEach(p => p.currentHp = p.maxHp);
      b.myPokemon.currentHp = b.myPokemon.maxHp;
      b.log.push(`✨ Restauración completa de todo el equipo!`);
    } else {
      const healed = Math.min(item.healAmount, b.myPokemon.maxHp - b.myPokemon.currentHp);
      b.myPokemon.currentHp = Math.min(b.myPokemon.maxHp, b.myPokemon.currentHp + item.healAmount);
      b.log.push(`${item.icon} ${b.myPokemon.name} recuperó ${healed} HP!`);
    }
  } else if (item.category === 'boost') {
    if (!b.buffs) b.buffs = {};
    if (itemId === 'xattack') b.buffs.atkTurns = (b.buffs.atkTurns||0) + item.turns;
    if (itemId === 'xdefense') b.buffs.defTurns = (b.buffs.defTurns||0) + item.turns;
    b.log.push(`${item.icon} ¡${item.name} activado por ${item.turns} turnos!`);
  }
  
  b.logIdx = b.log.length - 1;
  saveState();
  closeModal();
  renderBattle();
  showToast(`Usaste ${item.icon} ${item.name}`, 'success');
}

function openCatchModal() {
  const b = state.battle;
  if (!b || b.phase !== 'fighting') return;
  const inv = state.jugador?.inventory || {};
  const rival = b.rivalPokemon;
  const rc = RARITY_CONFIG[rival.rarity];
  const rivHpPct = rival.currentHp / rival.maxHp;
  
  const balls = SHOP_ITEMS.filter(i => i.category === 'ball' && (inv[i.id]||0) > 0);
  
  openModal(`🔴 Atrapar a ${rival.name}`, `
    <div style="text-align:center; margin-bottom:16px;">
      <img src="${rival.sprite}" style="width:80px;height:80px;image-rendering:pixelated;">
      <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:var(--yellow);margin-top:8px;">${rival.name}</div>
      <span class="rarity-badge rarity-${rival.rarity}" style="margin-top:6px;display:inline-flex;">${rc.label}</span>
      <div style="font-size:12px;color:var(--muted2);margin-top:8px;">HP: ${Math.round(rivHpPct*100)}% — ${rival.rarity==='legendary'?'¡Extremadamente difícil!':rival.rarity==='epic'?'Muy difícil':'Dificultad normal'}</div>
    </div>
    <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow);margin-bottom:10px;">Elige pokébola:</div>
    <div class="inventory-grid">
      ${balls.map(item => `
        <div class="inv-item" onclick="throwBall('${item.id}')" title="${item.desc}">
          <div class="inv-item-icon">${item.icon}</div>
          <div class="inv-item-name">${item.name}</div>
          <div class="inv-item-qty">x${inv[item.id]}</div>
        </div>
      `).join('')}
    </div>
    ${balls.length === 0 ? '<div style="color:var(--muted2);text-align:center;font-size:13px;">Sin pokébolas disponibles</div>' : ''}
  `);
}

function throwBall(ballId) {
  const b = state.battle;
  if (!b) return;
  const ball = SHOP_ITEMS.find(i => i.id === ballId);
  const inv = state.jugador?.inventory;
  if (!ball || !inv || !inv[ballId]) return;
  
  inv[ballId]--;
  closeModal();
  
  const rival = b.rivalPokemon;
  const rc = RARITY_CONFIG[rival.rarity];
  const catchBase = rc.catchBase;
  const rivHpMod = 1 + (1 - rival.currentHp / rival.maxHp); // más fácil si tiene poco HP
  const catchChance = Math.min(0.98, catchBase * ball.catchMult * rivHpMod);
  
  b.log.push(`${ball.icon} Lanzaste una ${ball.name}...`);
  b.logIdx = b.log.length - 1;
  
  const caught = Math.random() < catchChance;
  
  if (caught) {
    b.caughtPokemon = JSON.parse(JSON.stringify(rival));
    b.log.push(`✅ ¡${rival.name} fue capturado!`);
    b.logIdx = b.log.length - 1;
    showToast(`🎉 ¡Capturaste a ${rival.name}!`, 'success');
    
    if (b.infiniteMode) {
      // En modo infinito, reaparecer nuevo rival al capturar
      saveState();
      endBattleCleanup(true);
    } else {
      endBattle(true);
    }
  } else {
    b.log.push(`💨 ¡${rival.name} escapó de la pokébola!`);
    b.logIdx = b.log.length - 1;
    showToast(`${rival.name} escapó... intenta con una pokébola mejor o bájale más HP.`, 'info');
  }
  
  saveState();
  renderBattle();
}

function processAnswer(correct, correctAnswer) {
  const b = state.battle;
  b.lastAnswerCorrect = correct;
  b.lastCorrectAnswer = correctAnswer;
  
  const rivalDelay = b.dificultad === 'easy' ? 2500 : b.dificultad === 'medium' ? 1200 : 400;
  
  // Avanzar pregunta y detectar fin de ronda
  b.preguntaIdx++;
  if (b.preguntaIdx >= b.preguntas.length) {
    if (b.infiniteMode && b.infiniteConfig?.condition === 'rounds') {
      b.infiniteConfig.completedRounds = (b.infiniteConfig.completedRounds || 0) + 1;
      if (b.infiniteConfig.completedRounds >= b.infiniteConfig.targetRounds) {
        endInfiniteMode('rounds'); return;
      }
    }
    b.preguntas = shuffle([...b.preguntas]);
    b.preguntaIdx = 0;
    b.log.push('🔁 ¡Nueva ronda de preguntas!');
  }
  
  // Comprobar fin por tiempo
  if (b.infiniteMode && b.infiniteConfig?.condition === 'time') {
    if (Date.now() - b.infiniteConfig.startTime >= b.infiniteConfig.limitMs) {
      endInfiniteMode('time'); return;
    }
  }

  if (correct) {
    // +10 monedas por acierto
    if (state.jugador) {
      state.jugador.coins = (state.jugador.coins || 0) + 10;
      b.correctCount = (b.correctCount || 0) + 1;
    }
    const move = b.myPokemon.moves[b.pendingMove || 0];
    let damage = calcDamage(b.myPokemon, b.rivalPokemon, move);
    if (b.buffs?.atkTurns > 0) { damage = Math.floor(damage * 2); b.buffs.atkTurns--; }
    b.rivalPokemon.currentHp = Math.max(0, b.rivalPokemon.currentHp - damage);
    if (move) move.currentPP = Math.max(0, (move.currentPP || move.pp) - 1);
    b.log.push(`✅ ¡Correcto! +10🪙 · ${b.myPokemon.name} → ${damage} dmg`);
    b.logIdx = b.log.length - 1;
    updateCoinDisplay();
    
    if (b.rivalPokemon.currentHp <= 0) {
      b.rivalPokemon.currentHp = 0;
      if (b.infiniteMode) { endBattleCleanup(true); return; }
      endBattle(true); return;
    }
    b.phase = 'fighting';
    b.pendingMove = null;
    startRivalTimer(); // restart rival timer after player's successful attack
  } else {
    // Wrong answer: rival attacks immediately after a short delay
    stopRivalTimer();
    b.phase = 'result';
    b.log.push(`❌ Incorrecto. Resp: ${correctAnswer}`);
    b.log.push(`😤 ¡${b.rivalPokemon.name} ataca!`);
    b.logIdx = b.log.length - 1;
    setTimeout(() => rivalAttack(), rivalDelay);
  }
  
  saveState();
  renderBattle();
}

function rivalAttack() {
  const b = state.battle;
  if (!b || b.phase === 'ended') return;
  
  const move = b.rivalPokemon.moves[Math.floor(Math.random() * b.rivalPokemon.moves.length)];
  let damage = calcDamage(b.rivalPokemon, b.myPokemon, move);
  if (b.buffs?.defTurns > 0) { damage = Math.floor(damage / 2); b.buffs.defTurns--; }
  b.myPokemon.currentHp = Math.max(0, b.myPokemon.currentHp - damage);
  b.log.push(`⚡ ${b.rivalPokemon.name} usó ${move?.name || 'Ataque'} → ${damage} dmg`);
  b.logIdx = b.log.length - 1;
  
  if (b.myPokemon.currentHp <= 0) {
    b.myPokemon.currentHp = 0;
    if (b.infiniteMode) { endInfiniteMode('faint'); return; }
    endBattle(false);
    return;
  }
  
  b.phase = 'fighting';
  b.pendingMove = null;
  saveState();
  renderBattle();
  startRivalTimer(); // rival can attack again after their turn
}

function renderResultPanel() {
  const b = state.battle;
  const delayLabel = b.dificultad === 'easy' ? '2.5s' : b.dificultad === 'medium' ? '1.2s' : '0.4s';
  
  return `
    <div style="text-align:center; padding:20px 0;">
      <div style="font-size:56px; margin-bottom:12px;">❌</div>
      <div style="font-family:'Press Start 2P',monospace; font-size:13px; color:var(--red); margin-bottom:12px;">¡INCORRECTO!</div>
      <div style="font-size:14px; color:var(--muted2); margin-bottom:8px;">La respuesta correcta era:</div>
      <div style="font-size:15px; font-weight:800; color:white; background:rgba(255,255,255,0.08); padding:10px 16px; border-radius:10px; margin-bottom:16px;">${escapeHtml(b.lastCorrectAnswer || '')}</div>
      <div style="font-size:13px; color:var(--red-light);">😤 ¡El rival atacará en ${delayLabel}!</div>
    </div>
  `;
}

function renderEndedPanel() {
  const b = state.battle;
  const won = b.playerWon;
  return `
    <div class="card" style="text-align:center; padding:24px; border-color:${won ? 'rgba(255,215,0,0.5)' : 'rgba(227,53,13,0.3)'};">
      <div style="font-size:48px; margin-bottom:8px;">${won ? '🏆' : '💀'}</div>
      <div style="font-family:'Press Start 2P',monospace; font-size:12px; color:${won ? 'var(--yellow)' : 'var(--red)'}; margin-bottom:12px; line-height:1.8;">
        ${won ? '¡VICTORIA!' : 'DERROTA'}
      </div>
      ${won ? `<div style="font-size:13px;color:var(--yellow);margin-bottom:12px;font-weight:800;">+100 🪙 ganadas!</div>` : ''}
      ${b.caughtPokemon ? `
        <div style="margin-bottom:14px; padding:10px; background:rgba(61,170,86,0.1); border-radius:10px; border:1px solid rgba(61,170,86,0.3);">
          <img src="${b.caughtPokemon.sprite}" style="width:56px;height:56px;image-rendering:pixelated;">
          <div style="font-size:12px; font-weight:700; margin-top:4px; color:var(--green);">¡${b.caughtPokemon.name} capturado!</div>
        </div>
      ` : ''}
      <div style="font-size:12px;color:var(--muted2);margin-bottom:14px;">Usa pokébolas para capturar Pokémon durante la batalla.</div>
      <button class="btn btn-yellow btn-lg" onclick="endBattleCleanup()" style="width:100%; justify-content:center;">
        Continuar →
      </button>
    </div>
  `;
}

function calcDamage(attacker, defender, move) {
  if (!move || !move.power) return randInt(5, 15);
  const atk = attacker.stats.atk;
  const def = defender.stats.def;
  const lvl = attacker.level;
  let dmg = Math.floor(((2 * lvl / 5 + 2) * move.power * (atk / def)) / 50 + 2);
  // Random factor
  dmg = Math.floor(dmg * (randInt(85, 100) / 100));
  return Math.max(1, dmg);
}

function endBattle(playerWon, fled = false) {
  const b = state.battle;
  if (!b) return;
  stopRivalTimer();
  b.phase = 'ended';
  b.playerWon = playerWon;
  
  if (fled) {
    b.log.push('🏃 ¡Huiste de la batalla!');
    b.logIdx = b.log.length - 1;
  } else if (playerWon) {
    // +100 monedas por victoria
    if (state.jugador) {
      state.jugador.coins = (state.jugador.coins || 0) + 100;
      updateCoinDisplay();
    }
    const expGained = b.rivalPokemon.level * 50;
    b.myPokemon.exp += expGained;
    b.log.push(`💀 ¡${b.rivalPokemon.name} se debilitó!`);
    b.log.push(`⭐ ${b.myPokemon.name} ganó ${expGained} EXP · +100🪙`);
    
    if (b.myPokemon.exp >= b.myPokemon.expToNext) {
      b.myPokemon.level++;
      b.myPokemon.exp -= b.myPokemon.expToNext;
      b.myPokemon.expToNext = b.myPokemon.level * 100;
      b.myPokemon.maxHp = Math.floor(b.myPokemon.maxHp * 1.1);
      b.myPokemon.currentHp = Math.min(b.myPokemon.currentHp + 10, b.myPokemon.maxHp);
      b.log.push(`🎉 ¡${b.myPokemon.name} subió al nivel ${b.myPokemon.level}!`);
    }
    b.logIdx = b.log.length - 1;
    if (!state.jugador.wins) state.jugador.wins = 0;
    state.jugador.wins++;
  } else {
    b.log.push(`💀 ¡${b.myPokemon.name} se debilitó!`);
    b.log.push('😞 ¡Has sido derrotado!');
    b.logIdx = b.log.length - 1;
    if (!state.jugador.losses) state.jugador.losses = 0;
    state.jugador.losses++;
  }
  
  // Update my pokemon in team
  const myIdx = b.myPokemonIdx;
  if (state.jugador.team[myIdx]) {
    state.jugador.team[myIdx] = { ...state.jugador.team[myIdx], ...b.myPokemon };
  }
  
  saveState();
  renderBattle();
}

function endBattleCleanup(infiniteRespawn = false) {
  const b = state.battle;
  if (!b) return;
  
  // Añadir pokemon capturado al equipo/caja
  if (b.caughtPokemon) {
    if ((state.jugador.team || []).length < 6) {
      state.jugador.team.push(b.caughtPokemon);
    } else {
      if (!state.jugador.box) state.jugador.box = [];
      state.jugador.box.push(b.caughtPokemon);
    }
    showToast(`🎉 ${b.caughtPokemon.name} añadido al equipo!`, 'success');
  }
  
  // Guardar estado del pokémon activo
  const myIdx = b.myPokemonIdx;
  if (state.jugador.team[myIdx]) {
    state.jugador.team[myIdx] = { ...state.jugador.team[myIdx], ...b.myPokemon };
  }
  
  if (infiniteRespawn && b.infiniteMode) {
    // No terminar — spawnear nuevo rival
    const myLevel = b.myPokemon.level;
    const newRival = spawnRivalPokemon(myLevel);
    const rc = RARITY_CONFIG[newRival.rarity];
    b.rivalPokemon = newRival;
    b.caughtPokemon = null;
    b.phase = 'fighting';
    b.pendingMove = null;
    b.log.push(`✨ ¡${newRival.name} [${rc?.label}] apareció!`);
    b.logIdx = b.log.length - 1;
    if (newRival.rarity === 'epic' || newRival.rarity === 'legendary') {
      showToast(`✨ ¡Apareció un ${rc.label}: ${newRival.name}!`, 'success');
    }
    saveState();
    renderBattle();
    startRivalTimer();
    return;
  }
  
  // Recuperar HP completo
  if (state.jugador.team) {
    state.jugador.team.forEach(p => { p.currentHp = p.maxHp; });
  }
  
  state.battle = null;
  saveState();
  renderJugar();
  renderPokemon();
  updateCoinDisplay();
  showToast('¡Batalla terminada! Todos los Pokémon recuperaron HP. 💊', 'success');
}

function endInfiniteMode(reason) {
  const b = state.battle;
  if (!b) return;
  stopRivalTimer();
  
  // Guardar estado del pokémon
  const myIdx = b.myPokemonIdx;
  if (state.jugador.team[myIdx]) {
    state.jugador.team[myIdx] = { ...state.jugador.team[myIdx], ...b.myPokemon };
  }
  if (state.jugador.team) {
    state.jugador.team.forEach(p => { p.currentHp = p.maxHp; });
  }
  
  const correct = b.correctCount || 0;
  const coinsEarned = correct * 10 + (state.jugador.wins || 0) * 100;
  
  let reasonText = '';
  if (reason === 'time') reasonText = '⏱️ ¡Tiempo completado!';
  else if (reason === 'rounds') reasonText = '🔁 ¡Rondas completadas!';
  else if (reason === 'faint') reasonText = '💀 ¡Tu Pokémon se debilitó!';
  
  // Mostrar resumen en modal
  openModal('♾️ Modo Infinito — Resumen', `
    <div style="text-align:center; padding:16px 0;">
      <div style="font-size:48px; margin-bottom:12px;">${reason==='faint'?'😞':'🏆'}</div>
      <div style="font-family:'Press Start 2P',monospace; font-size:11px; color:var(--yellow); margin-bottom:20px; line-height:1.8;">${reasonText}</div>
      <div style="display:flex; flex-direction:column; gap:10px; text-align:left;">
        <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;">
          <span>✅ Respuestas correctas</span><strong>${correct}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(255,215,0,0.08);border-radius:8px;">
          <span>🪙 Monedas ganadas (esta sesión)</span><strong style="color:var(--yellow);">${correct * 10}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(255,215,0,0.05);border-radius:8px;">
          <span>🪙 Total de monedas</span><strong style="color:var(--yellow);">${(state.jugador.coins||0).toLocaleString()}</strong>
        </div>
      </div>
      <button class="btn btn-yellow btn-lg" style="width:100%;margin-top:20px;justify-content:center;" onclick="closeModal(); state.battle=null; saveState(); renderJugar(); renderPokemon(); updateCoinDisplay();">
        ✅ Continuar
      </button>
    </div>
  `);
  
  state.battle = null;
  saveState();
  updateCoinDisplay();
}

function runFromBattle() {
  if (confirm('¿Seguro que quieres huir de la batalla?')) {
    const b = state.battle;
    if (b?.infiniteMode) {
      endInfiniteMode('faint');
    } else {
      endBattle(false, true);
      setTimeout(() => endBattleCleanup(), 1500);
    }
  }
}

function swapToBox(teamIdx) {
  const j = state.jugador;
  if (!j || j.team.length <= 1) { showToast('Necesitas al menos 1 Pokémon en el equipo', 'error'); return; }
  if (!j.box) j.box = [];
  const [p] = j.team.splice(teamIdx, 1);
  j.box.push(p);
  saveState();
  renderJugador();
  showToast(`${p.name} enviado a la caja`, 'info');
}

function addToTeamFromBox(boxIdx) {
  const j = state.jugador;
  if (!j) return;
  if ((j.team||[]).length >= 6) { showToast('El equipo está lleno (máx. 6)', 'error'); return; }
  const [p] = j.box.splice(boxIdx, 1);
  j.team.push(p);
  saveState();
  renderJugador();
  showToast(`¡${p.name} se unió al equipo!`, 'success');

function changeShopQty(itemId, delta) {
  const input = document.getElementById(`shopQty_${itemId}`);
  if (!input) return;
  const newVal = Math.max(1, Math.min(99, (parseInt(input.value)||1) + delta));
  input.value = newVal;
}

function buyItem(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  if (!item || !state.jugador) return;
  const qtyInput = document.getElementById(`shopQty_${itemId}`);
  const qty = Math.max(1, parseInt(qtyInput?.value || '1'));
  const totalCost = item.price * qty;
  
  if ((state.jugador.coins || 0) < totalCost) {
    showToast(`¡No tienes suficientes monedas! Necesitas 🪙${totalCost.toLocaleString()}`, 'error');
    return;
  }
  
  state.jugador.coins -= totalCost;
  if (!state.jugador.inventory) state.jugador.inventory = {};
  state.jugador.inventory[itemId] = (state.jugador.inventory[itemId] || 0) + qty;
  saveState();
  updateCoinDisplay();
  showToast(`¡Compraste ${qty}x ${item.name} por 🪙${totalCost.toLocaleString()}!`, 'success');
  renderTienda();
}

function genId() { return Math.random().toString(36).substr(2, 9) + Date.now().toString(36); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

// ============================================================
// RIVAL AUTO-ATTACK TIMER
// ============================================================
let rivalTimerInterval = null;
let rivalTimerSecsLeft = 0;

function getRivalTimerSeconds(dificultad) {
  if (dificultad === 'easy')   return 18;
  if (dificultad === 'medium') return 10;
  if (dificultad === 'hard')   return 5;
  return 10;
}

function startRivalTimer() {
  stopRivalTimer();
  const b = state.battle;
  if (!b) return;
  rivalTimerSecsLeft = getRivalTimerSeconds(b.dificultad);
  updateRivalTimerDisplay();
  rivalTimerInterval = setInterval(() => {
    const b = state.battle;
    if (!b || b.phase === 'ended') { stopRivalTimer(); return; }
    // Only tick down during fighting or question phases
    if (b.phase !== 'fighting' && b.phase !== 'question') return;
    rivalTimerSecsLeft--;
    updateRivalTimerDisplay();
    if (rivalTimerSecsLeft <= 0) {
      stopRivalTimer();
      if (!b || b.phase === 'ended') return;
      b.log.push(`😤 ¡${b.rivalPokemon.name} atacó sin esperar!`);
      b.logIdx = b.log.length - 1;
      b.phase = 'fighting'; // close question modal if open
      rivalAttack();
    }
  }, 1000);
}

function stopRivalTimer() {
  if (rivalTimerInterval) {
    clearInterval(rivalTimerInterval);
    rivalTimerInterval = null;
  }
  rivalTimerSecsLeft = 0;
  updateRivalTimerDisplay();
}

function updateRivalTimerDisplay() {
  const el = document.getElementById('rivalTimerDisplay');
  if (!el) return;
  const b = state.battle;
  if (!b || b.phase === 'ended') { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const pct = Math.round((rivalTimerSecsLeft / getRivalTimerSeconds(b.dificultad)) * 100);
  const color = pct > 50 ? 'var(--green)' : pct > 25 ? 'var(--yellow)' : 'var(--red)';
  el.innerHTML = `
    <span style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted2);white-space:nowrap;">😤 RIVAL</span>
    <div style="flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width 0.9s linear;"></div>
    </div>
    <span style="font-family:'Press Start 2P',monospace;font-size:9px;color:${color};min-width:20px;text-align:right;">${rivalTimerSecsLeft}s</span>
  `;
}
